<div class="p-4">
  <p-card>
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold text-surface-800">Periodos Fiscales</h2>
      <p-button label="Nuevo Periodo" icon="pi pi-plus" (onClick)="displayModal = true"></p-button>
    </div>

    <app-customtable
      [genericCol]="cols"
      [loaderFunction]="accountingService.getFiscalPeriods.bind(accountingService)"
      [columnTemplates]="columnTemplates"
      [actionsTemplate]="actionsTemplate"
      titletable="Periodos">
    </app-customtable>
  </p-card>
</div>

<ng-template #statusTemplate let-item>
  <span [class]="'px-2 py-1 rounded text-xs font-bold ' + (item.status === 'OPEN' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700')">
    {{ item.status }}
  </span>
</ng-template>

<ng-template #actionsTemplate let-item>
  @if (item.status === 'OPEN') {
    <p-button icon="pi pi-lock" severity="danger" text pTooltip="Cerrar Periodo" (onClick)="confirmClosePeriod(item.id)"></p-button>
  }
</ng-template>

<p-dialog [(visible)]="displayModal" header="Nuevo Periodo" [modal]="true">
  <form [formGroup]="form" class="p-4 flex flex-col gap-4">
    <div class="flex flex-col">
      <label>Año</label>
      <p-inputNumber formControlName="year" [useGrouping]="false"></p-inputNumber>
    </div>
    <div class="flex flex-col">
      <label>Mes</label>
      <p-inputNumber formControlName="month" [min]="1" [max]="12"></p-inputNumber>
    </div>
    <p-button label="Guardar" (onClick)="createPeriod()"></p-button>
  </form>
</p-dialog>
<p-confirmDialog></p-confirmDialog>
<p-toast></p-toast>
