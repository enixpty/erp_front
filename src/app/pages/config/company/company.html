<div class="p-4 h-full overflow-auto">
<div class="p-6 bg-surface-100 min-h-screen">
    <p-card styleClass="shadow-xl rounded-2xl border-t-4 border-primary">
        <ng-template pTemplate="header">
            <div class="flex justify-between items-center p-8 bg-surface-50 border-b border-surface-200">
                <div>
                    <h2 class="text-2xl font-bold text-primary-900 m-0">Configuración de la Empresa</h2>
                    <p class="text-sm text-surface-500 m-0">Administre la identidad legal y corporativa de su organización.</p>
                </div>
                <div class="flex gap-3">
                    <p-button label="Cancelar" icon="pi pi-times" severity="secondary" [text]="true" (onClick)="loadCompanyData()" [disabled]="submitting()"></p-button>
                    <p-button label="Guardar Cambios" icon="pi pi-save" (onClick)="save()" [loading]="submitting()" [disabled]="form.invalid"></p-button>
                </div>
            </div>
        </ng-template>

        <form [formGroup]="form" class="grid grid-cols-1 md:grid-cols-12 gap-8 p-4">
            <!-- Sección Izquierda: Logo -->
            <div class="md:col-span-4 flex flex-col items-center gap-4">
                <div class="w-full flex flex-col items-center p-6 border-2 border-dashed border-surface-200 rounded-2xl bg-surface-50">
                    <span class="text-xs font-bold uppercase text-surface-500 mb-4">Logo Corporativo</span>
                    
                    <div class="relative group mb-6">
                        <div class="w-48 h-48 rounded-xl overflow-hidden border border-surface-200 bg-white flex items-center justify-center shadow-sm">
                            @if (logoPreview()) {
                                <img [src]="logoPreview()" alt="Logo preview" class="max-w-full max-h-full object-contain p-2">
                            } @else {
                                <i class="pi pi-image text-surface-300 text-6xl"></i>
                            }
                        </div>
                    </div>

                    <p-fileUpload 
                        mode="basic" 
                        chooseLabel="Cambiar Logo" 
                        chooseIcon="pi pi-upload" 
                        name="logo" 
                        accept="image/*" 
                        maxFileSize="1000000" 
                        (onSelect)="onSelectLogo($event)"
                        styleClass="p-button-outlined w-full">
                    </p-fileUpload>
                </div>
            </div>

            <!-- Sección Derecha: Datos Legales -->
            <div class="md:col-span-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold uppercase text-surface-600 mb-2">Nombre Legal de la Empresa <span class="text-red-500">*</span></label>
                        <input pInputText formControlName="name" class="w-full p-inputtext-lg" />
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-surface-600 mb-2">R.U.C.</label>
                        <input pInputText formControlName="ruc" class="w-full" />
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-surface-600 mb-2">D.V.</label>
                        <input pInputText formControlName="dv" class="w-full" />
                    </div>

                    <p-divider class="md:col-span-2"></p-divider>

                    <div class="md:col-span-2">
                        <h3 class="text-md font-bold text-surface-900 flex items-center gap-2">
                            <i class="pi pi-map-marker text-primary"></i> Información de Contacto
                        </h3>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-surface-600 mb-2">Correo Electrónico</label>
                        <input pInputText formControlName="email" class="w-full" />
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-surface-600 mb-2">Teléfono</label>
                        <input pInputText formControlName="phone" class="w-full" />
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold uppercase text-surface-600 mb-2">Dirección Física</label>
                        <textarea pInputTextarea formControlName="address" rows="3" class="w-full"></textarea>
                    </div>
                </div>
            </div>
        </form>
    </p-card>
</div>


</div>
