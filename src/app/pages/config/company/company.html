<div class="p-4 h-full overflow-auto">
    <p-card>
        <ng-template pTemplate="header">
            <div class="flex justify-between items-center p-6 bg-surface-50 dark:bg-surface-900 border-b border-surface-200 dark:border-surface-700">
                <div>
                    <h2 class="text-2xl font-bold text-primary">Configuración de la Empresa</h2>
                    <p class="text-sm text-surface-500">Administre la identidad legal y corporativa de su organización.</p>
                </div>
                <div class="flex gap-2">
                    <p-button label="Cancelar" icon="pi pi-times" severity="secondary" [text]="true" (onClick)="loadCompanyData()" [disabled]="submitting()"></p-button>
                    <p-button label="Guardar Cambios" icon="pi pi-save" [rounded]="true" (onClick)="save()" [loading]="submitting()" [disabled]="form.invalid"></p-button>
                </div>
            </div>
        </ng-template>

        <form [formGroup]="form" class="grid grid-cols-1 md:grid-cols-12 gap-8 p-4">
            <!-- Sección Izquierda: Logo -->
            <div class="md:col-span-4 flex flex-col items-center gap-4">
                <div class="w-full flex flex-col items-center p-6 border-2 border-dashed border-surface-300 dark:border-surface-600 rounded-xl bg-surface-50 dark:bg-surface-950">
                    <span class="text-lg font-semibold mb-4">Logo Corporativo</span>
                    
                    <div class="relative group mb-6">
                        <div class="w-48 h-48 rounded-lg overflow-hidden border border-surface-200 dark:border-surface-800 bg-white dark:bg-black flex items-center justify-center shadow-md">
                            @if (logoPreview()) {
                                <img [src]="logoPreview()" alt="Logo preview" class="max-w-full max-h-full object-contain p-2">
                            } @else {
                                <i class="pi pi-image text-surface-300 text-6xl"></i>
                            }
                        </div>
                    </div>

                    <p-fileUpload 
                        mode="basic" 
                        chooseLabel="Cambiar Logo" 
                        chooseIcon="pi pi-upload" 
                        name="logo" 
                        accept="image/*" 
                        maxFileSize="1000000" 
                        (onSelect)="onSelectLogo($event)"
                        styleClass="p-button-outlined p-button-sm w-full">
                    </p-fileUpload>
                    <p class="text-xs text-surface-500 mt-2 text-center">JPG, PNG o WEBP. Máx 1MB.</p>
                </div>
            </div>

            <!-- Sección Derecha: Datos Legales -->
            <div class="md:col-span-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label for="name" class="block text-sm font-bold mb-2">Nombre Legal de la Empresa <span class="text-red-500">*</span></label>
                        <input pInputText id="name" formControlName="name" placeholder="Ej: Mi Empresa S.A." class="w-full" />
                    </div>

                    <div>
                        <label for="ruc" class="block text-sm font-bold mb-2">R.U.C.</label>
                        <input pInputText id="ruc" formControlName="ruc" placeholder="Ej: 1234567-1-123456" class="w-full" />
                    </div>

                    <div>
                        <label for="dv" class="block text-sm font-bold mb-2">D.V.</label>
                        <input pInputText id="dv" formControlName="dv" placeholder="Ej: 00" class="w-full" />
                    </div>

                    <p-divider class="md:col-span-2"></p-divider>

                    <div class="md:col-span-2">
                        <h3 class="text-md font-semibold mb-4 flex items-center gap-2">
                            <i class="pi pi-map-marker text-primary"></i> Información de Contacto
                        </h3>
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-bold mb-2">Correo Electrónico</label>
                        <input pInputText id="email" formControlName="email" placeholder="contacto@empresa.com" class="w-full" />
                    </div>

                    <div>
                        <label for="phone" class="block text-sm font-bold mb-2">Teléfono / Celular</label>
                        <input pInputText id="phone" formControlName="phone" placeholder="+507 0000-0000" class="w-full" />
                    </div>

                    <div class="md:col-span-2">
                        <label for="address" class="block text-sm font-bold mb-2">Dirección Física</label>
                        <textarea pInputText id="address" formControlName="address" rows="3" placeholder="Ubicación completa..." class="w-full resize-none"></textarea>
                    </div>
                </div>
            </div>
        </form>
    </p-card>
</div>

<p-toast></p-toast>
