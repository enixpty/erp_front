<ng-template #actionButtonsTemplate let-lval>
    <div class="flex gap-2 justify-center">
        <p-button 
            icon="pi pi-pencil" 
            [rounded]="true" [text]="true"
            severity="secondary"
            pTooltip="Editar"
            (click)="editLval(lval)"> 
        </p-button>

        <p-button 
            icon="pi pi-trash" 
            [rounded]="true" [text]="true"
            severity="danger"
            pTooltip="Eliminar"
            (click)="confirmDelete(lval)"> 
        </p-button>
    </div>
</ng-template>

<ng-template #statusTemplate let-lval>
    <span [class]="lval.status === '1' ? 'bg-green-100 text-green-800 px-2 py-1 rounded-full text-xs font-semibold' : 'bg-red-100 text-red-800 px-2 py-1 rounded-full text-xs font-semibold'">
        {{ lval.status === '1' ? 'Activo' : 'Inactivo' }}
    </span>
</ng-template>

<div class="w-auto pt-2  pl-2 pr-2 h-90">     
    <p-card >
        <ng-template pTemplate="header">
            <div class="flex justify-between items-center p-6 ">
                <div>
                    <h2 class="text-xl font-bold">Configuración Genérica</h2>
                    <p class="text-sm text-surface-500">Gestión de catálogos y valores maestros (LVAL).</p>
                </div>
                <p-button label="Nuevo Registro" icon="pi pi-plus" [rounded]="true" 
                          (onClick)="openNew()">
                </p-button>
            </div>
        </ng-template>

        <div class="pt-4">
            <app-customtable 
                [genericCol]="cols" 
                #lvalTable 
                [actionsTemplate]="actionButtonsTemplate"
                [columnTemplates]="{status: statusTemplate}"
                [loaderFunction]="lvalService.getLvals.bind(lvalService)">
            </app-customtable>
        </div>
    </p-card>
</div>

<!-- Modal Form -->
<p-dialog 
  [(visible)]="displayModal" 
  [header]="isEdit() ? 'Editar Registro' : 'Nuevo Registro'" 
  [modal]="true" 
  [breakpoints]="{ '960px': '75vw', '641px': '95vw' }"
  [style]="{ width: '650px' }"
  [draggable]="false"
  [resizable]="false"
  class="p-fluid">
  
  <form [formGroup]="form" class="flex flex-col gap-5 pt-2">
    <div class="flex flex-col gap-2">
      <label for="category" class="text-sm font-bold">Categoría <span class="text-red-500">*</span></label>
      <input pInputText id="category" formControlName="category" placeholder="Ej: ESTADO_CIVIL" autocomplete="off" />
    </div>

    <div class="flex flex-col gap-2">
      <label for="name" class="text-sm font-bold">Nombre / Etiqueta <span class="text-red-500">*</span></label>
      <input pInputText id="name" formControlName="name" placeholder="Ej: Soltero" autocomplete="off" />
    </div>

   
        <div class="flex flex-col gap-2">
            <label for="value" class="text-sm font-bold">Valor <span class="text-red-500">*</span></label>
            <input pInputText id="value" formControlName="value" placeholder="Ej: SOL" autocomplete="off" />
        </div>
        <div class="flex flex-col gap-2">
            <label for="order" class="text-sm font-bold">Orden <span class="text-red-500">*</span></label>
            <p-inputnumber id="order" formControlName="order" [showButtons]="true" [min]="0" />
        </div>
  

    <div class="flex items-center justify-between py-4 border-t border-surface-100 dark:border-surface-800 mt-4">
      <span class="text-sm font-bold">Estado del Registro</span>
      <p-toggleButton formControlName="status" onLabel="Activo" offLabel="Inactivo" 
                      onIcon="pi pi-check" offIcon="pi pi-times" class="w-32 shadow-none"></p-toggleButton>
    </div>

    <div class="flex justify-end gap-3 mt-6">
      <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="displayModal.set(false)"></p-button>
      <p-button [label]="isEdit() ? 'Actualizar' : 'Guardar'" 
                [loading]="submitting()" 
                [disabled]="form.invalid"
                (onClick)="save()">
      </p-button>
    </div>
  </form>
</p-dialog>

<p-confirmDialog [style]="{width: '350px'}" position="top"></p-confirmDialog>
<p-toast></p-toast>
