<div class="p-6 bg-surface-50 min-h-screen">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-surface-900 m-0">Monitor de Antigüedad</h1>
        <div class="flex gap-3 bg-white p-2 rounded-lg shadow-sm border border-surface-200">
            <p-select [options]="clients" [(ngModel)]="selectedClient" optionLabel="first_name" 
                      placeholder="Seleccionar cliente..." [filter]="true" class="w-72"></p-select>
            <p-button label="Analizar" icon="pi pi-chart-line" (onClick)="loadClientData()" severity="primary"></p-button>
            <p-button label="Estado Cuenta" icon="pi pi-print" severity="secondary" [disabled]="!selectedClient" (onClick)="printStatement()"></p-button>
        </div>
    </div>


    @if (agingData) {
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8">
            <div class="bg-white p-5 rounded-xl border border-surface-100 shadow-sm flex items-center gap-4 transition-transform hover:-translate-y-1">
                <div class="p-3 bg-blue-50 text-blue-600 rounded-lg"><i class="pi pi-bolt text-xl"></i></div>
                <div>
                    <p class="text-xs font-semibold text-surface-500 uppercase tracking-wider">Actual</p>
                    <div class="text-xl font-bold text-surface-900">{{agingData.current | currency}}</div>
                </div>
            </div>
            <div class="bg-white p-5 rounded-xl border border-surface-100 shadow-sm flex items-center gap-4">
                <div class="p-3 bg-green-50 text-green-600 rounded-lg"><i class="pi pi-calendar text-xl"></i></div>
                <div>
                    <p class="text-xs font-semibold text-surface-500 uppercase tracking-wider">30 Días</p>
                    <div class="text-xl font-bold text-surface-900">{{agingData.days_30 | currency}}</div>
                </div>
            </div>
            <div class="bg-white p-5 rounded-xl border border-surface-100 shadow-sm flex items-center gap-4">
                <div class="p-3 bg-yellow-50 text-yellow-600 rounded-lg"><i class="pi pi-clock text-xl"></i></div>
                <div>
                    <p class="text-xs font-semibold text-surface-500 uppercase tracking-wider">60 Días</p>
                    <div class="text-xl font-bold text-surface-900">{{agingData.days_60 | currency}}</div>
                </div>
            </div>
            <div class="bg-white p-5 rounded-xl border border-surface-100 shadow-sm flex items-center gap-4">
                <div class="p-3 bg-orange-50 text-orange-600 rounded-lg"><i class="pi pi-exclamation-triangle text-xl"></i></div>
                <div>
                    <p class="text-xs font-semibold text-surface-500 uppercase tracking-wider">90 Días</p>
                    <div class="text-xl font-bold text-surface-900">{{agingData.days_90 | currency}}</div>
                </div>
            </div>
            <div class="bg-white p-5 rounded-xl border border-surface-100 shadow-sm flex items-center gap-4">
                <div class="p-3 bg-red-50 text-red-600 rounded-lg"><i class="pi pi-ban text-xl"></i></div>
                <div>
                    <p class="text-xs font-semibold text-surface-500 uppercase tracking-wider">120+ Días</p>
                    <div class="text-xl font-bold text-surface-900">{{agingData.days_120_plus | currency}}</div>
                </div>
            </div>
        </div>
    }

    @if (subsidiaries.length > 0) {
        <div class="bg-white p-6 rounded-xl border border-surface-200 shadow-sm">
            <app-customtable 
                titletable="Documentos con Saldo Pendiente"
                [data]="subsidiaries" 
                [columns]="cols">
            </app-customtable>
        </div>
    }
</div>
