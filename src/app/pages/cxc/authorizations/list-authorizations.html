
<div class="p-4">
    <p-card header="Autorizaciones de Venta Pendientes">
        <app-customtable
            [genericCol]="cols"
            [loaderFunction]="loadAuthorizations"
            [columnTemplates]="{ 'action': actionTemplate }"
            titletable="Solicitudes de Autorización">
        </app-customtable>
    </p-card>
</div>

<ng-template #actionTemplate let-item>
    @if (item.status === 'PENDING') {
        <div class="flex gap-2">
            <p-button icon="pi pi-check" severity="success" text pTooltip="Aprobar" (click)="approve(item)"></p-button>   

            <p-button icon="pi pi-times" severity="danger" text pTooltip="Rechazar" (click)="reject(item.id)"></p-button>
        </div>
    } @else {
        <span class="text-surface-400 italic">Procesado</span>
    }
</ng-template>
