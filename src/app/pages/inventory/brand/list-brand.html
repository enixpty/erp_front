<div class="p-6 bg-surface-100 min-h-screen">
  <p-card styleClass="shadow-xl border-t-4 border-t-primary rounded-2xl mb-6">
    <div class="flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="bg-primary-100 p-3 rounded-xl">
                <i class="pi pi-bookmark text-primary-700 text-2xl"></i>
            </div>
            <div>
                <h2 class="text-2xl font-bold text-primary-900 m-0">Marcas</h2>
                <p class="text-surface-500 m-0 text-sm">Administre el catálogo de marcas de productos.</p>
            </div>
        </div>
        <p-button label="Nueva Marca" icon="pi pi-plus" (onClick)="openNew()" severity="primary"></p-button>
    </div>
  </p-card>

  <p-card styleClass="shadow-lg rounded-2xl border-none">
    <app-customtable
      [data]="brands()"
      [columns]="cols"
      [columnTemplates]="{ 'actions': actionButtonsTemplate, 'status': statusTemplate }"
      titletable="Marcas">
    </app-customtable>
  </p-card>
</div>

<ng-template #actionButtonsTemplate let-brand>
    <div class="flex gap-1 justify-center">
        <p-button icon="pi pi-pencil" [text]="true" severity="primary" pTooltip="Editar" (click)="editBrand(brand)"></p-button>
        <p-button icon="pi pi-trash" [text]="true" severity="danger" pTooltip="Eliminar" (click)="confirmDelete(brand)"></p-button>
    </div>
</ng-template>

<ng-template #statusTemplate let-brand>
    <span [class]="brand.status === '1' ? 'bg-green-100 text-green-800 px-2 py-1 rounded-full text-xs font-semibold' : 'bg-red-100 text-red-800 px-2 py-1 rounded-full text-xs font-semibold'">
        {{ brand.status === '1' ? 'Activo' : 'Inactivo' }}
    </span>
</ng-template>

<!-- Modal Form -->
<p-dialog
  [(visible)]="displayModal"
  [header]="isEdit() ? 'Editar Marca' : 'Nueva Marca'"
  [modal]="true"
  [style]="{ width: '450px' }"
  [draggable]="false"
  [resizable]="false"
  class="p-fluid">

  <form [formGroup]="form" class="flex flex-col gap-5 pt-2">
    <div class="flex flex-col gap-2">
      <label for="name" class="text-sm font-bold">Nombre de la Marca <span class="text-red-500">*</span></label>
      <input pInputText id="name" formControlName="name" placeholder="Ej: Nike" autocomplete="off" />
    </div>

    <div class="flex items-center justify-between py-4 border-t border-surface-100 mt-4">
      <span class="text-sm font-bold">Estado del Registro</span>
      <p-toggleButton formControlName="status" onLabel="Activo" offLabel="Inactivo"
                      onIcon="pi pi-check" offIcon="pi pi-times" class="w-32 shadow-none"></p-toggleButton>
    </div>

    <div class="flex justify-end gap-3 mt-6">
      <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="displayModal.set(false)"></p-button>
      <p-button [label]="isEdit() ? 'Actualizar' : 'Guardar'"
                [loading]="submitting()"
                [disabled]="form.invalid"
                (onClick)="save()">
      </p-button>
    </div>
  </form>
</p-dialog>

<p-confirmDialog [style]="{width: '350px'}" position="top"></p-confirmDialog>
