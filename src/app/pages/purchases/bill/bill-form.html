@if (receipt()) {
  <div class="p-4">
    <p-card header="Registrar Factura de Proveedor">
      <form [formGroup]="form" (ngSubmit)="save()">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="mb-4">
              <label class="block mb-2 font-bold">Número de Factura</label>
              <input pInputText formControlName="invoice_number" class="w-full" required>
          </div>
          <div class="mb-4">
              <label class="block mb-2 font-bold">Fecha de Factura</label>
              <p-datepicker formControlName="invoice_date" [showIcon]="true" class="w-full"></p-datepicker>
          </div>
          <div class="mb-4">
              <label class="block mb-2 font-bold">Total Facturado</label>
              <p-inputNumber formControlName="total_amount" mode="currency" currency="USD" class="w-full"></p-inputNumber>
          </div>
        </div>
        <div class="flex justify-end gap-2">
          <p-button label="Cancelar" severity="secondary" [routerLink]="['/purchases/list-bill']"></p-button>
          <p-button label="Registrar Factura" type="submit" severity="success" [disabled]="form.invalid"></p-button>
        </div>
      </form>
    </p-card>
  </div>
} @else {
  <div class="p-4">
    <p-card header="Registrar Factura de Proveedor">
      <p>No se ha seleccionado una recepción válida.</p>
      <p-button label="Volver a Recepciones" icon="pi pi-arrow-left" [routerLink]="['/purchases/receipts']"></p-button>
    </p-card>
  </div>
}
<p-toast></p-toast>
