<div class="p-4">
  <p-card>
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold">Facturas de Proveedor</h2>
      <!-- El botón de Nueva Factura se quitó de aquí porque requiere una Recepción previa -->
    </div>
    <app-customtable
      [genericCol]="cols"
      [loaderFunction]="loadInvoices"
      [actionsTemplate]="actions"
      titletable="Facturas">
<ng-template #actions let-item>
    <div class="flex gap-1 justify-center" style="width: 140px;">
        <p-button icon="pi pi-file-pdf" severity="secondary" text size="small" pTooltip="Ver PDF" (onClick)="printPDF(item.id)"></p-button>
        @if (item.status === 'PENDING') {
            <p-button icon="pi pi-send" severity="secondary" size="small" pTooltip="Enviar a Validar" (onClick)="changeStatus(item, 'PENDING_VALIDATION')"></p-button>
        }
        @if (item.status === 'PENDING_VALIDATION') {
            <p-button icon="pi pi-check" severity="success" size="small" pTooltip="Validar" (onClick)="changeStatus(item, 'VALIDATED')"></p-button>
        }
    </div>
</ng-template>
    </app-customtable>
  </p-card>
</div>
