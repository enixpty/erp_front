<div class="p-4">
  <p-card header="Nueva Nota de Débito">
    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="flex flex-col gap-2">
          <label>Factura</label>
          <p-select [options]="invoices" formControlName="invoice" optionLabel="invoice_number" optionValue="id" placeholder="Seleccione Factura" [filter]="true"></p-select>
        </div>
        <div class="flex flex-col gap-2">
            <label>Monto</label>
            <input pInputText type="number" formControlName="amount" />
        </div>
        <div class="flex flex-col gap-2 md:col-span-2">
            <label>Motivo</label>
            <textarea pTextarea formControlName="reason" rows="3"></textarea>
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-4">
        <p-button label="Cancelar" severity="secondary" [routerLink]="['/purchases/debit-notes']"></p-button>
        <p-button label="Registrar" type="submit" [disabled]="form.invalid"></p-button>
      </div>
    </form>
  </p-card>
</div>
