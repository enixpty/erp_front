<div class="p-6 bg-surface-100 min-h-screen">
  <p-card styleClass="shadow-xl border-t-4 border-t-primary rounded-2xl mb-6">
    <div class="flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="bg-primary-100 p-3 rounded-xl">
                <i class="pi pi-minus-circle text-primary-700 text-2xl"></i>
            </div>
            <div>
                <h2 class="text-2xl font-bold text-primary-900 m-0">Notas de Débito</h2>
                <p class="text-surface-500 m-0 text-sm">Registro de ajustes y devoluciones a proveedores.</p>
            </div>
        </div>
        <p-button label="Nueva Nota" icon="pi pi-plus" [routerLink]="['/purchases/debit-notes/new']" severity="primary"></p-button>
    </div>
  </p-card>

  <p-card styleClass="shadow-lg rounded-2xl border-none">
    <app-customtable
      [genericCol]="cols"
      [loaderFunction]="loadDebitNotes"
      [columnTemplates]="{ 'action': actionTemplate }"
      titletable="Notas de Débito">
    </app-customtable>
  </p-card>
</div>

<ng-template #actionTemplate let-item>
    <div class="flex gap-1 justify-center">
        <p-button icon="pi pi-print" [text]="true" severity="secondary" pTooltip="Imprimir Nota" (click)="printDebitNote(item.id)"></p-button>
    </div>
</ng-template>
