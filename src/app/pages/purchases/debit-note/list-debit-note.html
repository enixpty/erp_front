<div class="p-4">
  <p-card header="Notas de Débito">
    <div class="flex justify-end mb-4">
      <p-button label="Nueva Nota" icon="pi pi-plus" [routerLink]="['/purchases/debit-notes/new']"></p-button>
    </div>
    <app-customtable
      [genericCol]="cols"
      [loaderFunction]="loadDebitNotes"
      [columnTemplates]="{ 'action': actionTemplate }"
      titletable="Notas de Débito">
    </app-customtable>
  </p-card>
</div>

<ng-template #actionTemplate let-item>
    <div class="flex gap-2">
        <p-button icon="pi pi-print" pTooltip="Imprimir Nota" severity="help" text (click)="printDebitNote(item.id)"></p-button>
    </div>
</ng-template>
