<div class="p-4">
  <p-card header="Listado de Orden de Compras Recibidas">
    <app-customtable 
        [genericCol]="cols" 
        #recTable 
        [loaderFunction]="recService.getReceipts.bind(recService)"
        [actionsTemplate]="actions"> 
    </app-customtable>
  </p-card>
</div>

<ng-template #actions let-rec>
    <div class="flex gap-2">
        <p-button icon="pi pi-file-pdf" pTooltip="Imprimir Comprobante" severity="secondary" text (onClick)="downloadPdf(rec.id)"></p-button>
        <p-button icon="pi pi-receipt" pTooltip="Facturar" severity="success" text (onClick)="navigateToInvoice(rec.id)"></p-button>
        <p-button icon="pi pi-eye" pTooltip="Ver Detalle" severity="info" text [routerLink]="['/purchases/receipt-detail', rec.id]"></p-button>
    </div>
</ng-template>
