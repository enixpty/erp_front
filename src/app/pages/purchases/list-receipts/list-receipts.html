<div class="p-6 bg-surface-100 min-h-screen">
  <p-card styleClass="shadow-xl border-t-4 border-t-primary rounded-2xl mb-6">
    <div class="flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="bg-primary-100 p-3 rounded-xl">
                <i class="pi pi-truck text-primary-700 text-2xl"></i>
            </div>
            <div>
                <h2 class="text-2xl font-bold text-primary-900 m-0">Recepciones de Mercancía</h2>
                <p class="text-surface-500 m-0 text-sm">Registro de entradas de inventario.</p>
            </div>
        </div>
    </div>
  </p-card>

  <p-card styleClass="shadow-lg rounded-2xl border-none">
    <app-customtable 
        [genericCol]="cols" 
        #recTable 
        [loaderFunction]="recService.getReceipts.bind(recService)"
        [columnTemplates]="{ 'actions': actions }"
        titletable="Recepciones">
    </app-customtable>
  </p-card>
</div>

<ng-template #actions let-rec>
    <div class="flex gap-2 justify-center">
        <p-button icon="pi pi-undo" [text]="true" severity="help" pTooltip="Devolver Mercancía" [routerLink]="['/purchases/return/new']" [queryParams]="{ receiptId: rec.id }"></p-button>
        <p-button icon="pi pi-file-pdf" [text]="true" severity="secondary" pTooltip="Imprimir Comprobante" (onClick)="downloadPdf(rec.id)"></p-button>
        @if (!rec.is_invoiced) {
            <p-button icon="pi pi-receipt" [text]="true" severity="success" pTooltip="Facturar" (onClick)="navigateToInvoice(rec.id)"></p-button>
        }
        <p-button icon="pi pi-eye" [text]="true" severity="info" pTooltip="Ver Detalle" [routerLink]="['/purchases/receipt-detail', rec.id]"></p-button>
    </div>
</ng-template>
