<div class="p-4">
  <p-card class="mb-4">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold text-surface-800">Nueva Orden de Compra</h2>
      <div class="flex gap-2">
        <p-button label="Cancelar" severity="secondary" [routerLink]="['/purchases/orders']"></p-button>
        <p-button label="Crear Orden" icon="pi pi-check" (onClick)="save()"></p-button>
      </div>
    </div>

    <form [formGroup]="form">
        <!-- Metadatos (Estilo Recepción) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-6 p-4 bg-surface-50 rounded-lg border border-surface-200 mb-6">
            <div class="flex flex-col">
                <label class="text-xs text-surface-500 uppercase font-bold mb-1">Proveedor</label>
                <p-select [options]="suppliers()" formControlName="supplier" optionLabel="name" optionValue="id" placeholder="Seleccionar" class="w-full" appendTo="body"></p-select>
            </div>
            <div class="flex flex-col">
                <label class="text-xs text-surface-500 uppercase font-bold mb-1">Bodega</label>
                <p-select [options]="warehouses()" formControlName="warehouse" optionLabel="name" optionValue="id" placeholder="Seleccionar" class="w-full" appendTo="body"></p-select>
            </div>
            <div class="flex flex-col">
                <label class="text-xs text-surface-500 uppercase font-bold mb-1">Flete</label>
                <p-inputNumber formControlName="freight_cost" mode="currency" currency="USD" locale="en-US" class="w-full" styleClass="w-full"></p-inputNumber>
            </div>
            <div class="flex flex-col">
                <label class="text-xs text-surface-500 uppercase font-bold mb-1">Seguro</label>
                <p-inputNumber formControlName="insurance_cost" mode="currency" currency="USD" locale="en-US" class="w-full" styleClass="w-full"></p-inputNumber>
            </div>
            <div class="flex flex-col">
                <label class="text-xs text-surface-500 uppercase font-bold mb-1">IVA (%)</label>
                <input type="text" [value]="taxRateDisplay" readonly class="p-inputtext w-full bg-surface-50 font-semibold text-surface-700">
            </div>

            <div class="flex flex-col justify-center text-right border-l border-surface-200 pl-4 sm:border-l-0 sm:pl-0 xl:border-l xl:pl-4">
                <p class="text-xs text-surface-500 uppercase font-bold mb-1">Total Orden</p>
                <p class="text-2xl font-black text-primary-600">{{ total | currency:'USD' }}</p>
            </div>
        </div>


        <p-card header="Materiales">
            <div class="overflow-hidden border border-surface-200 rounded-lg">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-surface-100">
                        <tr class="text-surface-600">
                            <th class="p-3">SKU</th>
                            <th class="p-3">Descripción</th>
                            <th class="p-3 w-32">Cantidad</th>
                            <th class="p-3 w-40">Precio</th>
                            <th class="p-3 w-32 text-right">Subtotal</th>
                            <th class="p-3 w-32 text-right">ITBMS</th>
                            <th class="p-3 w-32 text-right">Total</th>
                            <th class="p-3 w-12"></th>
                        </tr>
                    </thead>
                    <tbody formArrayName="lines">
                        <tr *ngFor="let line of lines.controls; let i = index" [formGroupName]="i" class="border-t">
                            <td class="p-3">
                                <p-autoComplete formControlName="sku" [suggestions]="filteredSkus()"
                                [appendTo]="'body'"
                                (completeMethod)="searchSku($event)" (onSelect)="onSkuSelect($event, line)" field="code" optionLabel="code" [forceSelection]="true" dataKey="id"></p-autoComplete>
                            </td>
                            <td class="p-3"><input pInputText formControlName="description" readonly class="w-full bg-surface-50"></td>
                            <td class="p-3"><p-inputNumber formControlName="quantity" class="w-full"></p-inputNumber></td>
                            <td class="p-3"><p-inputNumber formControlName="unit_price" mode="currency" currency="USD" class="w-full"></p-inputNumber></td>
                            <td class="p-3 text-right font-semibold">{{ getLineSubtotal(line) | currency:'USD' }}</td>
                            <td class="p-3 text-right text-surface-600">{{ getLineTax(line) | currency:'USD' }}</td>
                            <td class="p-3 text-right font-bold text-primary-600">{{ getLineTotal(line) | currency:'USD' }}</td>
                            <td class="p-3"><p-button icon="pi pi-trash" severity="danger" [text]="true" (click)="lines.removeAt(i)"></p-button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="mt-4"><p-button label="Agregar Material" icon="pi pi-plus" (onClick)="addLine()"></p-button></div>
        </p-card>
    </form>
  </p-card>
</div>
