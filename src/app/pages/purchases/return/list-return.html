<div class="p-4">
  <p-card header="Devoluciones a Proveedor">
    <app-customtable
      [genericCol]="cols"
      [loaderFunction]="loadReturns"
      [columnTemplates]="{ 'return_date': dateTemplate, 'action': actionTemplate }"
      titletable="Devoluciones">
    </app-customtable>
  </p-card>
</div>

<ng-template #dateTemplate let-item>
    {{ item.return_date | date:'medium' }}
</ng-template>

<ng-template #actionTemplate let-item>
    <div class="flex gap-2">
        <p-button icon="pi pi-eye" pTooltip="Ver Detalle" severity="info" text [routerLink]="['/purchases/return', item.id]"></p-button>
        <p-button icon="pi pi-print" pTooltip="Imprimir Devolución" severity="help" text (click)="printReturn(item.id)"></p-button>
    </div>
</ng-template>
