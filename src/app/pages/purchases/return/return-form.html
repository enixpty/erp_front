@if (receipt()) {
  <div class="p-4">
    <p-card [header]="'Nueva Devolución - Recepción #' + receipt().id">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4 text-sm bg-surface-50 p-3 rounded">
        <div><strong>Proveedor:</strong> {{ receipt().supplier_name }}</div>
        <div><strong>Fecha de Recepción:</strong> {{ receipt().received_date | date:'dd/MM/yyyy' }}</div>
      </div>
      <form [formGroup]="form" (ngSubmit)="save()">
        <div class="mb-4">
          <label class="block mb-2 font-bold">Motivo de la Devolución</label>
          <textarea pInputTextarea formControlName="reason" class="w-full" rows="3" required></textarea>
        </div>

        <div class="overflow-hidden border border-surface-200 rounded-lg mb-4">
          <table class="w-full text-left border-collapse" formArrayName="lines">
              <thead class="bg-surface-100">
                  <tr class="text-surface-600">
                      <th class="p-3">SKU</th>
                      <th class="p-3">Cant. Recibida</th>
                      <th class="p-3">Cantidad a Devolver</th>
                  </tr>
              </thead>
              <tbody>
                  @for (line of lines.controls; track line; let i = $index) {
                    <tr [formGroupName]="i" class="border-t">
                      <td class="p-3">{{ line.value.sku_name }}</td>
                      <td class="p-3">{{ receipt().lines[i].quantity }}</td>
                      <td class="p-3">
                          <p-inputNumber formControlName="quantity" [min]="0" [max]="receipt().lines[i].quantity"></p-inputNumber>
                      </td>
                    </tr>
                  }
              </tbody>
          </table>
        </div>

        <div class="flex justify-end gap-2">
          <p-button label="Cancelar" severity="secondary" [routerLink]="['/purchases/receipts']"></p-button>
          <p-button label="Confirmar Devolución" type="submit" severity="danger" [disabled]="form.invalid"></p-button>
        </div>
      </form>
    </p-card>
  </div>
}
<p-toast></p-toast>
