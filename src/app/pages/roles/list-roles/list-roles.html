<p-toast />
<ng-template #actionButtonsTemplate let-role>
    <div class="flex gap-2">
        <p-button 
            icon="pi pi-pencil" 
            styleClass="p-button-warning p-button-sm"
            (click)="handleEdit(role)">
        </p-button>

        <p-button 
            icon="pi pi-trash" 
            styleClass="p-button-danger p-button-sm"
            (click)="handleDelete(role)">
        </p-button>
    </div>
</ng-template>

<ng-template #DeleteButtonsTemplate let-role>       
    <h3>El rol {{selectedDelete().name}} solo se eliminará si no tiene otros registros relacionados</h3>
    <p>¿Desea eliminar el rol?</p>
    <div class="flex justify-end gap-4 pt-3">
        <p-button 
            label="Confirmar" 
            icon="pi pi-check" 
            styleClass="p-button-sm p-button-success" 
            (click)="handDelete()">
        </p-button>
    
        <p-button 
            label="Cancelar" 
            icon="pi pi-times" 
            styleClass="p-button-sm p-button-secondary"
            (click)="delExit()">
        </p-button>
    </div>
</ng-template>

<app-custom-modal #delModal
    InputHeader="Eliminar rol"
    [InputVisible]="this.delVisible()"
    [actionsTemplate]="DeleteButtonsTemplate"
    (InputVisibleChange)="delVisible.set($event)">
</app-custom-modal>

<ng-template #EditButtonsTemplate let-edit>       
    <input id="id" type="hidden" [(ngModel)]="selectedRole().id" class="flex-auto" autocomplete="off" />
    
    <div class="col-span-2">
        <label for="name" class="font-semibold w-24">Nombre</label>
        <input pInputText id="name" class="flex-auto w-full"  
                [(ngModel)]="selectedRole().name"
                autocomplete="off" />
        @if (isNameRequired()) {
            <p-message severity="error" size="small" 
                variant="simple">El Nombre es requerido</p-message>
        }
    </div>
    
    <div class="col-span-4 pt-2"> 
        <label for="active" class="font-semibold w-24">Estado</label>
        <p-select [options]="statusOptions()" [(ngModel)]="selectedStatus" [appendTo]="'body'"
            class="flex-auto w-full"  
            optionLabel="name" placeholder="Seleccionar" />
        @if (isStatusRequired()) {
            <p-message severity="error" size="small" 
                variant="simple">El Estado es requerido</p-message>
        }
    </div>

    <div class="flex justify-end gap-4 pt-3">
        <p-button 
            label="Confirmar" 
            icon="pi pi-check" 
            styleClass="p-button-sm p-button-success" 
            (click)="handEdit()">
        </p-button>
    
        <p-button 
            label="Cancelar" 
            icon="pi pi-times" 
            styleClass="p-button-sm p-button-secondary"
            (click)="delExit()">
        </p-button>
    </div>
</ng-template>

<app-custom-modal #editModal
    InputHeader="Editar rol"
    [InputVisible]="this.isVisible()"
    [actionsTemplate]="EditButtonsTemplate"
    (InputVisibleChange)="isVisible.set($event)">
</app-custom-modal>

<div class="w-auto pt-2 pl-2 pr-2 h-90">    
    <p-card header="Listado de Roles">
        <app-customtable [genericCol]="this.cols" 
            #rolesTable 
            [actionsTemplate]="actionButtonsTemplate"
            [loaderFunction]="roles.get_roles.bind(roles)">
        </app-customtable>
    </p-card>
</div>
