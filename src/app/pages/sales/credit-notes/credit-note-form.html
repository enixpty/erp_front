<p-toast />
<div class="p-6 bg-surface-100 min-h-screen">
    <p-card styleClass="shadow-xl border-t-4 border-t-primary rounded-2xl">
        <ng-template pTemplate="header">
            <div class="flex items-center justify-between p-6 bg-primary-50">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-white rounded-xl shadow-sm">
                        <i class="pi pi-file-minus text-2xl text-primary"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold text-primary-900 m-0">Nueva Nota de Crédito</h2>
                        <p class="text-primary-700 m-0 text-sm opacity-80">Reversión de factura seleccionada</p>
                    </div>
                </div>
                <div class="flex gap-3">
                    <p-button label="Cancelar" icon="pi pi-times" severity="secondary" [routerLink]="['/sales/invoices']" styleClass="p-button-outlined"></p-button>
                    <p-button label="Generar NC" icon="pi pi-check" (onClick)="save()" severity="danger"></p-button>
                </div>
            </div>
        </ng-template>

        <form [formGroup]="form" class="grid grid-cols-1 md:grid-cols-12 gap-8 p-4">
            <div class="md:col-span-6 flex flex-col gap-2">
                <label class="text-xs font-bold text-surface-600 uppercase">Factura Original</label>
                <p-select [options]="invoices" formControlName="invoice" optionLabel="searchLabel" optionValue="id" 
                    placeholder="Buscar Factura..." [filter]="true" class="w-full" (onChange)="onInvoiceChange($event)"></p-select>
            </div>
            
            <div class="md:col-span-6 flex flex-col gap-2">
                <label class="text-xs font-bold text-surface-600 uppercase">Motivo de Nota de Crédito</label>
                <input pInputText formControlName="reason" placeholder="Motivo de la devolución..." class="w-full" />
            </div>

            <p-divider class="md:col-span-12"></p-divider>

            <div class="md:col-span-12">
                <h3 class="text-md font-bold text-surface-800 mb-4">Productos a Devolver</h3>
                <div class="border border-surface-200 rounded-xl overflow-hidden shadow-sm">
                    <p-table [value]="details.controls" class="w-full">
                        <ng-template pTemplate="header">
                            <tr class="bg-surface-50 text-surface-700 uppercase text-xs">
                                <th class="p-4">Producto</th>
                                <th class="p-4 text-center">Cantidad a Devolver</th>
                                <th class="p-4 text-right">Subtotal</th>
                            </tr>
                        </ng-template>
                        <ng-template pTemplate="body" let-detail let-i="rowIndex">
                            <tr [formGroup]="detail" class="hover:bg-red-50/30 transition-colors">
                                <td class="p-3">{{detail.get('sku_name').value}}</td>
                                <td class="p-3">
                                    <input pInputText type="number" formControlName="quantity" (change)="calculateTotals()" class="w-full text-center" />
                                </td>
                                <td class="p-3 text-right font-bold text-surface-900">
                                    {{detail.get('subtotal').value | currency}}
                                </td>
                            </tr>
                        </ng-template>
                    </p-table>
                </div>
            </div>

            <div class="md:col-span-12 flex justify-end">
                <div class="w-full md:w-64 bg-surface-50 p-4 rounded-xl shadow-sm border border-surface-200">
                    <div class="flex justify-between font-bold text-lg">
                        <span>Total NC:</span>
                        <span class="text-red-600">{{form.get('total')?.value | currency}}</span>
                    </div>
                </div>
            </div>
        </form>
    </p-card>
</div>
