<div class="p-6 bg-surface-100 min-h-screen">
    <p-card styleClass="shadow-xl border-t-4 border-t-primary rounded-2xl mb-6">
        <div class="flex justify-between items-center">
            <div>
                <h2 class="text-2xl font-bold text-primary-900 m-0">Facturas de Venta</h2>
                <p class="text-surface-500 m-0">Histórico de ventas y facturación directa.</p>
            </div>
            <div class="flex gap-3">
                <p-button label="Nueva Nota de Crédito" icon="pi pi-file-minus" [routerLink]="['/sales/credit-notes/new']" severity="danger" size="small"></p-button>
                <p-button label="Nueva Factura Directa" icon="pi pi-plus" [routerLink]="['/sales/invoices/new']" severity="primary" size="small"></p-button>
            </div>
        </div>
    </p-card>

    <p-card styleClass="shadow-lg rounded-2xl overflow-hidden">
        <app-customtable 
            [data]="invoices()" 
            [columns]="columns" 
            [totalRecords]="totalRecords()" 
            [loading]="loading()"
            [columnTemplates]="{ 'status_display': status, 'actions': actions }"
            (onLazyLoad)="loadInvoices($event)">
            
            <ng-template #status let-row>
                <p-tag [value]="row.status_display" [severity]="getStatusSeverity(row.status)"></p-tag>
            </ng-template>

            <ng-template #actions let-row>
                <div class="flex gap-2">
                    <p-button icon="pi pi-eye" [text]="true" [routerLink]="['/sales/invoices', row.id]" severity="secondary" pTooltip="Ver Detalle"></p-button>
                    <p-button icon="pi pi-print" [text]="true" severity="info" pTooltip="Imprimir" (click)="printInvoice(row.id)"></p-button>
                </div>
            </ng-template>
        </app-customtable>
    </p-card>
</div>
