<p-toast />
<div class="p-4">
  <p-card header="Listado de Cotizaciones">
    <div class="flex justify-end mb-4">
        <p-button label="Nueva Cotización" icon="pi pi-plus" [routerLink]="['/sales/quotations/new']"></p-button>
    </div>
    <app-customtable
        [genericCol]="cols"
        [loaderFunction]="loadQuotations"
        [actionsTemplate]="actionTemplate"
        titletable="Cotizaciones">
    </app-customtable>
  </p-card>
</div>

<ng-template #actionTemplate let-item>
    <div class="flex gap-2">
        <p-button icon="pi pi-pencil" severity="secondary" text [routerLink]="['/sales/quotations/edit', item.id]"></p-button>
        <p-button icon="pi pi-trash" severity="danger" text (click)="deleteQuotation(item.id)"></p-button>
    </div>
</ng-template>
